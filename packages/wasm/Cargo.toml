[package]
name = "imexport-wasm"
version = "0.1.1"
edition = "2021"
rust-version = "1.88"
description = "Rust WebAssembly for import/export Excel files"
repository = "https://github.com/gui-xie/import-export"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["console_error_panic_hook"]
benchmarks = ["dep:criterion"]

[profile.release]
lto = true
opt-level = 's'

[dependencies]
wasm-bindgen = "0.2"
console_error_panic_hook = { version = "0.1", optional = true }
rust_xlsxwriter = { version = "0.77", features = ["wasm", "default"] }
chrono = "0.4"
js-sys = "0.3"
futures = "0.3"
wasm-bindgen-futures = "0.4"
calamine = { version = "0.36.0", features = ["picture"] }
indexmap = "2.7.0"
criterion = { version = "0.4.0", features = ["async_tokio"], optional = true }

[dev-dependencies]
insta = "1.42.2"
tokio = { version = "1", features = ["rt", "macros"] }

[[bench]]
name = "large_dataset"
harness = false
required-features = ["benchmarks"]

[package.metadata.wasm-pack.profile.dev.wasm-bindgen]
debug-js-glue = true
demangle-name-section = true
dwarf-debug-info = false
omit-default-module-path = false

[package.metadata.wasm-pack.profile.profiling]
wasm-opt = ['-O']

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[package.metadata.wasm-pack.profile.profiling.wasm-bindgen]
debug-js-glue = false
demangle-name-section = true
dwarf-debug-info = false
omit-default-module-path = false
