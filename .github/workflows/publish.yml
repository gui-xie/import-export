name: Publish packages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "publish" to publish both npm packages
        required: true
        type: string
      version:
        description: Expected package version to publish (for example 1.0.0)
        required: true
        type: string

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event.inputs.confirm == 'publish' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Update npm
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build wasm package
        run: corepack pnpm run release:build

      - name: Verify release versions
        run: |
          set -euo pipefail
          expected_version="${{ github.event.inputs.version }}"
          core_version="$(node -p "require('./packages/core/package.json').version")"
          wasm_version="$(node -p "require('./packages/wasm/package.json').version")"
          if [ "$core_version" != "$expected_version" ] || [ "$wasm_version" != "$expected_version" ]; then
            echo "Expected both packages to be version $expected_version, got core=$core_version wasm=$wasm_version" >&2
            exit 1
          fi

      - name: Pack npm packages
        run: |
          set -euo pipefail
          corepack pnpm run release:pack
          wasm_tarball="$(find /tmp/import-export-release -maxdepth 1 -name 'senlinz-import-export-wasm-*.tgz' -print -quit)"
          core_tarball="$(find /tmp/import-export-release -maxdepth 1 -name 'senlinz-import-export-*.tgz' ! -name 'senlinz-import-export-wasm-*.tgz' -print -quit)"
          test -n "$wasm_tarball"
          test -n "$core_tarball"
          echo "WASM_TARBALL=$wasm_tarball" >> "$GITHUB_ENV"
          echo "CORE_TARBALL=$core_tarball" >> "$GITHUB_ENV"

      - name: Determine npm dist-tags
        run: |
          set -euo pipefail
          get_dist_tag() {
            node -e "const packageJsonPath = process.argv[1]; const { version } = require(packageJsonPath); const prerelease = version.split('-', 2)[1] || ''; const tag = prerelease ? prerelease.split('.')[0] : ''; process.stdout.write(tag);" "$1"
          }
          echo "WASM_TAG=$(get_dist_tag "$GITHUB_WORKSPACE/packages/wasm/package.json")" >> "$GITHUB_ENV"
          echo "CORE_TAG=$(get_dist_tag "$GITHUB_WORKSPACE/packages/core/package.json")" >> "$GITHUB_ENV"

      - name: Publish npm packages
        run: |
          set -euo pipefail
          publish_package() {
            local tarball="$1"
            local tag="$2"
            if [ -n "$tag" ]; then
              npm publish "$tarball" --provenance --access public --tag "$tag"
            else
              npm publish "$tarball" --provenance --access public
            fi
          }
          publish_package "$WASM_TARBALL" "${WASM_TAG:-}"
          publish_package "$CORE_TARBALL" "${CORE_TAG:-}"
